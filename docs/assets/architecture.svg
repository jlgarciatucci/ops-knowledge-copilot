    <g filter="url(#s)"><rect x="850" y="180" width="200" height="86" rx="20" fill="url(#green)"/><text x="950" y="216" fill="white">LLM Provider</text><text x="950" y="242" fill="#DCFCE7" font-size="13">OpenAI or mock</text></g>

    <g filter="url(#s)"><rect x="250" y="365" width="190" height="96" rx="20" fill="#0EA5E9"/><text x="345" y="405" fill="white">Embeddings</text><text x="345" y="432" fill="#E0F2FE" font-size="13">OpenAI / local</text></g>
    <g filter="url(#s)"><rect x="510" y="365" width="190" height="96" rx="20" fill="#14B8A6"/><text x="605" y="405" fill="white">pgvector</text><text x="605" y="432" fill="#CCFBF1" font-size="13">Top-k search</text></g>
    <g filter="url(#s)"><rect x="770" y="365" width="190" height="96" rx="20" fill="#F97316"/><text x="865" y="405" fill="white">Reranker</text><text x="865" y="432" fill="#FFEDD5" font-size="13">Similarity + keywords</text></g>
    <g filter="url(#s)"><rect x="440" y="520" width="320" height="66" rx="18" fill="#475569"/><text x="600" y="560" fill="white">Query logs · cost · tokens · groundedness · feedback</text></g>
