  <text x="60" y="72" fill="#0F172A" font-family="Inter,Segoe UI,Arial" font-size="34" font-weight="800">System Architecture</text>
  <text x="60" y="105" fill="#475569" font-family="Inter,Segoe UI,Arial" font-size="17">Chat UI, API layer, RAG services, vector retrieval, LLM layer, and observability loop.</text>

  <g font-family="Inter,Segoe UI,Arial" font-size="16" font-weight="700" text-anchor="middle">
    <g filter="url(#s)"><rect x="70" y="180" width="180" height="86" rx="20" fill="url(#purple)"/><text x="160" y="216" fill="white">Streamlit</text><text x="160" y="242" fill="#FCE7F3" font-size="13">Chat frontend</text></g>
    <g filter="url(#s)"><rect x="330" y="180" width="180" height="86" rx="20" fill="url(#blue)"/><text x="420" y="216" fill="white">FastAPI</text><text x="420" y="242" fill="#DBEAFE" font-size="13">Routes + schemas</text></g>
