services:
  api:
    build: .
    container_name: ops-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sample_docs:/app/sample_docs:ro

  db:
    image: pgvector/pgvector:pg16
    container_name: ops-rag-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ops_rag
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d ops_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
